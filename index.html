<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Interstellar — Relativistic Solar System Flight</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  { "imports": { "three": "./lib/three.module.js" } }
  </script>
</head>
<body>
  <canvas id="view"></canvas>

  <!-- Language toggle (always visible) -->
  <div id="langtoggle"><span data-lang="en">EN</span><span data-lang="ru">RU</span></div>

  <!-- Start screen / how-to-fly -->
  <div id="startscreen">
    <div class="card">
      <div id="langtoggle2"><span data-lang="en">English</span><span data-lang="ru">Русский</span></div>
      <h1>INTERSTELLAR</h1>
      <p class="sub" data-i18n="start.sub"></p>
      <p data-i18n-html="start.intro"></p>
      <div class="controls" data-i18n-html="start.controls"></div>
      <p class="tip" data-i18n-html="start.tip"></p>
      <button id="startbtn" data-i18n="start.launch"></button>
    </div>
  </div>

  <!-- World-space overlay: body labels, target reticle, flight markers -->
  <div id="overlay"></div>

  <!-- Crosshair -->
  <div id="crosshair">+</div>

  <!-- Transient event log + live status line -->
  <div id="eventlog"></div>
  <div id="status" class="panel"></div>

  <!-- HUD -->
  <div id="hud" class="panel">
    <div class="row"><span data-i18n="hud.speed"></span><b id="speed">0</b></div>
    <div class="row"><span data-i18n="hud.gamma"></span><b id="gamma">1</b></div>
    <div class="row"><span data-i18n="hud.dilation"></span><b id="dilation">—</b></div>
    <div class="row"><span data-i18n="hud.accel"></span><b id="gforce">0 g</b></div>
    <hr/>
    <div class="row"><span data-i18n="hud.mode"></span><b id="mode">—</b></div>
    <div class="row"><span data-i18n="hud.throttle"></span><b id="throttle">0 %</b></div>
    <div class="row"><span data-i18n="hud.fuel"></span><b id="fuel">∞</b></div>
    <hr/>
    <div class="row"><span data-i18n="hud.ref"></span><b id="refbody">—</b></div>
    <div class="row"><span data-i18n="hud.alt"></span><b id="altitude">—</b></div>
    <div class="row"><span data-i18n="hud.atmo"></span><b id="atmo">—</b></div>
  </div>

  <div id="nav" class="panel">
    <div class="row"><span data-i18n="nav.target"></span><b id="target">—</b></div>
    <div class="row"><span data-i18n="nav.distance"></span><b id="tgtdist">—</b></div>
    <div class="row"><span data-i18n="nav.eta"></span><b id="tgteta">—</b></div>
    <div class="row"><span data-i18n="nav.periapsis"></span><b id="periapsis">—</b></div>
    <div class="row"><span data-i18n="nav.apoapsis"></span><b id="apoapsis">—</b></div>
    <div class="row"><span data-i18n="nav.closespeed"></span><b id="closespeed">—</b></div>
    <div class="row"><span data-i18n="nav.closedist"></span><b id="closedist">—</b></div>
    <div class="row"><span data-i18n="nav.closeeta"></span><b id="closeeta">—</b></div>
    <hr/>
    <div class="row"><span data-i18n="nav.simtime"></span><b id="simtime">0</b></div>
    <div class="row"><span data-i18n="nav.shiptime"></span><b id="shiptime">0</b></div>
    <div class="row"><span data-i18n="nav.warp"></span><b id="warp">1×</b></div>
    <div class="row"><span data-i18n="nav.fps"></span><b id="fps">—</b></div>
  </div>

  <div id="help" class="panel" data-i18n-html="help.html"></div>

  <script type="module" src="js/main.js"></script>

  <script>window.addEventListener("load",function(){try{window.goatcounter=window.goatcounter||{};window.goatcounter.path=function(p){return location.host+(p==="/"?"/index":p)};var s=document.createElement("script");s.async=true;s.src="//gc.zgo.at/count.js";s.setAttribute("data-goatcounter","https://stats.podlevskikh.com/count");s.onerror=function(){};document.body.appendChild(s)}catch(e){}});</script>
  <script>document.addEventListener("click",function(ev){try{var a=ev.target.closest("a");if(!a||!a.href)return;var href=a.href,name=null;if(/t\.me\/yerevan_afisha_bot/.test(href))name="telegram-afisha";else if(/t\.me\/podlevskikh_consult_bot/.test(href))name="telegram-consult";else if(/t\.me\/VladimirPodlevskikh/.test(href))name="telegram-personal";else if(/calendly\.com/.test(href))name="calendly";else if(/tutor\.podlevskikh\.com/.test(href)&&location.host!=="tutor.podlevskikh.com")name="to-tutor";var path;if(name){path="/cta-"+name;}else if(a.hostname&&a.hostname!==location.hostname&&(a.protocol==="http:"||a.protocol==="https:")){path="/out-"+a.hostname;}else return;var u="https://stats.podlevskikh.com/count?p="+encodeURIComponent(location.host+path)+"&e=true";if(navigator.sendBeacon){navigator.sendBeacon(u)}else{(new Image()).src=u}}catch(e){}},true);</script>
</body>
</html>
